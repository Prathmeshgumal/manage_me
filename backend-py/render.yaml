# Render blueprint for the MySchedule FastAPI backend.
# Set the secret env vars (DATABASE_URL, FRONTEND_URL, GITHUB_*) in the Render
# dashboard. DATABASE_URL must be the Supabase *session* connection (port 5432).
# Before the first deploy, run `alembic stamp head` once against the prod DB so
# the build's `alembic upgrade head` is a no-op (the tables already exist).
services:
  - type: web
    name: myschedule-api
    runtime: python
    rootDir: backend-py
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_APP_CLIENT_ID
        sync: false
      - key: GITHUB_APP_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY_BASE64
        sync: false
      - key: GITHUB_OAUTH_REDIRECT_URI
        sync: false
      - key: GITHUB_TOKEN_ENC_KEY
        sync: false
      - key: GITHUB_STATE_SECRET
        sync: false
