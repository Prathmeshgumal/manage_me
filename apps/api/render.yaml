# Render Blueprint for the MySchedule API.
# Create a new Blueprint in Render pointing at this repo, or configure a Web
# Service manually with the build/start commands below.
#
# Set DATABASE_URL (your Neon pooled connection string) in the Render dashboard.
services:
  - type: web
    name: myschedule-api
    runtime: node
    plan: free
    # Build runs from the repo root so pnpm can resolve the workspace.
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @myschedule/api prisma generate &&
      pnpm --filter @myschedule/api build &&
      pnpm --filter @myschedule/api prisma migrate deploy
    startCommand: pnpm --filter @myschedule/api start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
