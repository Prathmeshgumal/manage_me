# Render Blueprint for the MySchedule backend.
# Create a Web Service with Root Directory = backend, or use this Blueprint.
# Set DATABASE_URL (Supabase transaction pooler :6543) and DIRECT_URL
# (Supabase session pooler :5432, used by `prisma migrate deploy`) in the
# Render dashboard.
services:
  - type: web
    name: myschedule-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm prisma generate &&
      pnpm build &&
      pnpm prisma migrate deploy
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
